image boot.vfat {
    vfat {
        files = {
            "bcm2712-rpi-5-b.dtb",
            "overlays",
            "fixup_cd.dat",
            "fixup.dat",
            "fixup4.dat",
            "fixup4cd.dat",
            "start_cd.elf",
            "start.elf",
            "start4.elf",
            "start4cd.elf",
            "cmdline.txt",
            "config.txt",
            "Image"
        }
    }
    size = 64M
}

image hermes-pi5.img {
    hdimage {
        gpt = true
    }

    partition boot {
        partition-type-uuid = "c12a7328-f81f-11d2-ba4b-00a0c93ec93b"
        bootable = true
        image = "boot.vfat"
        size = 64M
    }

    partition rootfs {
        partition-type-uuid = "0fc63daf-8483-4772-8e79-3d69d8477de4"
        image = "rootfs.ext4"
        size = 2G
    }
}
