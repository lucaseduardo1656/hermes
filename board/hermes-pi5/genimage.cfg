image boot.vfat {
	vfat {
		files = {
			"bcm2712-rpi-5-b.dtb",
			"bcm2712d0-rpi-5-b.dtb",
			"start4.elf",
			"fixup4.dat",
			"Image",
			"config.txt",
			"cmdline.txt"
		}
	}
	size = 64M
}

image hermes-pi5.img {
	hdimage {
	}

	partition boot {
		partition-type = 0x0c
		bootable = true
		image = "boot.vfat"
		size = 64M
	}

	partition rootfs {
		partition-type = 0x83
		image = "rootfs.ext4"
		size = 2G
	}
}
