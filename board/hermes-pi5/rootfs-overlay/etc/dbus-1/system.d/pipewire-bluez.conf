<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!--
  Allow the `pipewire` system user to register MediaEndpoint1 /
  MediaPlayer1 / Profile1 objects with bluetoothd, so PipeWire's
  bluez5 monitor can advertise A2DP and AVRCP profiles. The stock
  bluez D-Bus policy only grants those interfaces to root.
-->
<busconfig>
  <policy user="pipewire">
    <allow send_destination="org.bluez"/>
    <allow send_interface="org.bluez.Agent1"/>
    <allow send_interface="org.bluez.MediaEndpoint1"/>
    <allow send_interface="org.bluez.MediaPlayer1"/>
    <allow send_interface="org.bluez.Profile1"/>
    <allow send_interface="org.freedesktop.DBus.ObjectManager"/>
    <allow send_interface="org.freedesktop.DBus.Properties"/>
    <allow send_interface="org.mpris.MediaPlayer2.Player"/>
  </policy>
</busconfig>
