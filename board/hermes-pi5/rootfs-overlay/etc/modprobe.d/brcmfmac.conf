# Workaround for status_code=16 ASSOC-REJECT on BCM43455 (Pi 5 built-in
# WiFi) connecting to mixed-mode WPA2 APs with TKIP group cipher.
# - feature_disable=0x82000 turns off SAE/SWSUP firmware offloads that
#   send IEs some APs reject.
# - roamoff=1 disables FW-side roaming which interferes with our
#   wpa_supplicant-driven association.
options brcmfmac feature_disable=0x82000 roamoff=1
