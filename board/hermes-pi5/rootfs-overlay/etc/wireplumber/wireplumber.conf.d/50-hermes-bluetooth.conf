# Hermes Bluetooth policy.
#
# Phase 1: the Pi only acts as an A2DP *source* — it sends audio to
# external speakers/headphones and never receives audio from a remote
# Bluetooth device. Disabling the sink role here prevents the
# "speaker treats Pi as audio source" failure mode where the remote
# auto-negotiates the sink profile and the Pi's outgoing audio never
# reaches it.
#
# When phase 2 (phone → car media) lands, re-enable a2dp_sink and add
# AVRCP target. Phase 3 (HFP calls) re-enables hfp_hf.
monitor.bluez.properties = {
  # Phase 2: the Pi is both source (sends to BT speakers) and sink
  # (receives from phones acting as media source). AVRCP gives the
  # remote a controller surface; AVRCP target is exposed automatically
  # by PipeWire so the phone can read what the Pi is playing.
  bluez5.roles = [ a2dp_source a2dp_sink avrcp ]
  bluez5.hfphsp-backend = none
  bluez5.enable-sbc-xq = true
  bluez5.enable-msbc = false
  bluez5.enable-hw-volume = true
  bluez5.auto-connect = [ a2dp_source a2dp_sink ]
}

# Make freshly-connected Bluetooth sinks the default audio output, so
# music starts playing out of the speaker the moment it pairs without
# the user having to pick a sink manually.
wireplumber.settings = {
  bluetooth.autoswitch-to-headset-profile = false
  device.routes.default-sink-volume       = 0.6
}
